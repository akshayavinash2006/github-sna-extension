<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub SNA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;500;700&display=swap');

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #39d353;
      --accent2: #58a6ff;
      --warn: #f78166;
      --text: #e6edf3;
      --muted: #8b949e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      padding: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: grid;
      place-items: center;
    }

    .logo-icon svg { width: 18px; height: 18px; }

    .logo-text {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .logo-text span { color: var(--accent); }

    .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus { border-color: var(--accent2); }
    input::placeholder { color: var(--muted); }
    input[type="range"] {
      padding: 0;
      background: transparent;
      border: none;
      height: 6px;
    }

    .field { margin-bottom: 14px; }

    .token-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .token-row input { flex: 1; }

    .hint {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
    }

    .hint a { color: var(--accent2); text-decoration: none; }

    button {
      width: 100%;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      padding: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.05em;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #status {
      margin-top: 14px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      min-height: 16px;
      line-height: 1.5;
    }

    #status.error { color: var(--warn); }
    #status.ok { color: var(--accent); }

    .rate-bar {
      margin-top: 16px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .rate-val { color: var(--accent2); }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    .open-panel-btn {
      background: var(--surface);
      color: var(--accent2);
      border: 1px solid var(--border);
      margin-top: 10px;
      font-size: 12px;
    }

    .open-panel-btn:hover { background: var(--border); opacity: 1; }

    .cache-bar {
      margin-top: 8px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .cache-val { color: var(--accent); }

    .clear-cache-btn {
      background: transparent;
      color: var(--warn);
      border: 1px solid var(--warn);
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      cursor: pointer;
      width: auto;
      letter-spacing: 0.04em;
      transition: background 0.2s, color 0.2s;
    }

    .clear-cache-btn:hover {
      background: var(--warn);
      color: #0d1117;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0d1117" stroke-width="2.5" stroke-linecap="round">
        <circle cx="5" cy="12" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="19" cy="19" r="2"/>
        <line x1="7" y1="11" x2="17" y2="6"/><line x1="7" y1="13" x2="17" y2="18"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">GitHub <span>SNA</span></div>
      <div class="subtitle">Social Network Analyzer</div>
    </div>
  </div>

  <div class="field">
    <label>GitHub Username</label>
    <input type="text" id="username" placeholder="e.g. torvalds" autocomplete="off" spellcheck="false" />
  </div>

  <div class="field">
    <label>GitHub Token <span style="color:#8b949e;font-weight:300">(optional but recommended)</span></label>
    <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" />
    <div class="hint">Increases rate limit from 60 → 5000 req/hr. <a href="https://github.com/settings/tokens" target="_blank">Get token ↗</a></div>
  </div>

  <div class="field">
    <label>Graph Type</label>
    <select id="graphType">
      <option value="stars">Common Starred Repos</option>
      <option value="followers">Followers & Following</option>
      <option value="contributors">Repo Contributors</option>
    </select>
  </div>

  <div class="field">
    <label>Max Display Nodes: <span id="maxNodesVal" style="color:var(--accent2)">100</span></label>
    <input type="range" id="maxNodes" min="20" max="300" step="10" value="100" />
  </div>

  <button id="analyzeBtn">▶ Analyze Network</button>
  <button class="open-panel-btn" id="openPanel">Open Side Panel →</button>

  <div id="status"></div>

  <hr class="divider" />
  <div class="rate-bar">
    <span>API Rate Limit</span>
    <span class="rate-val" id="rateDisplay">— / —</span>
  </div>
  <div class="cache-bar">
    <span>Cache: <span class="cache-val" id="cacheDisplay">— entries</span></span>
    <button class="clear-cache-btn" id="clearCacheBtn">✕ Clear</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>GitHub SNA — Panel</title>
  <script src="d3.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;500;700&display=swap');
    :root {
      --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
      --accent:#39d353;--accent2:#58a6ff;--accent3:#e3b341;--warn:#f78166;
      --text:#e6edf3;--muted:#8b949e;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--surface);}
    .header-title{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.05em;}
    .header-title span{color:var(--accent);}
    .seed-badge{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2);}
    .stats-row{display:flex;gap:16px;margin-left:auto;font-size:11px;color:var(--muted);}
    .stat strong{color:var(--text);font-size:13px;}
    .main{display:flex;flex:1;overflow:hidden;}
    #graph-wrap{flex:1;position:relative;overflow:hidden;}
    #graph-svg{width:100%;height:100%;}
    .graph-controls{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:6px;}
    .ctrl-btn{width:32px;height:32px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-size:16px;display:grid;place-items:center;transition:border-color .2s;}
    .ctrl-btn:hover{border-color:var(--accent2);}
    aside{width:240px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
    .tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
    .tab{flex:1;padding:8px;background:none;border:none;color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
    .tab-content{display:none;flex:1;overflow-y:auto;padding:12px;}
    .tab-content.active{display:block;}
    .tab-content::-webkit-scrollbar{width:4px;}
    .tab-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .influencer-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .2s;}
    .influencer-item:hover{opacity:.8;}
    .rank{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);width:18px;text-align:right;flex-shrink:0;}
    .avatar{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);flex-shrink:0;background:var(--surface2);}
    .inf-info{flex:1;min-width:0;}
    .inf-login{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .score-bar-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:3px;}
    .score-bar{height:100%;border-radius:2px;background:var(--accent);}
    .path-inputs{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
    .path-inputs input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Space Mono',monospace;font-size:11px;padding:7px 10px;outline:none;width:100%;transition:border-color .2s;}
    .path-inputs input:focus{border-color:var(--accent2);}
    .path-inputs input::placeholder{color:var(--muted);}
    .algo-toggle{display:flex;gap:6px;margin-bottom:10px;}
    .algo-btn{flex:1;padding:5px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;transition:all .2s;}
    .algo-btn.active{background:var(--accent2);color:var(--bg);border-color:var(--accent2);font-weight:700;}
    .find-btn{width:100%;background:var(--accent2);color:var(--bg);border:none;border-radius:6px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:9px;cursor:pointer;transition:opacity .2s;}
    .find-btn:hover{opacity:.85;}
    #path-result{margin-top:12px;font-size:11px;}
    .path-chain{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:8px;}
    .path-node{background:var(--surface2);border:1px solid var(--accent2);border-radius:4px;padding:2px 7px;font-family:'Space Mono',monospace;font-size:10px;color:var(--accent2);}
    .path-arrow{color:var(--muted);font-size:12px;}
    .path-meta{color:var(--muted);margin-top:6px;font-size:10px;font-family:'Space Mono',monospace;}
    .community-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px;}
    .community-title{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
    .community-dot{width:8px;height:8px;border-radius:50%;}
    .member-chip{display:inline-block;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1px 7px;margin:2px;font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;}
    .member-chip:hover{border-color:var(--accent2);color:var(--accent2);}
    #tooltip{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;max-width:200px;}
    #tooltip.visible{opacity:1;}
    .tooltip-name{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;margin-bottom:6px;color:var(--accent2);}
    .tooltip-row{display:flex;justify-content:space-between;gap:12px;color:var(--muted);margin-top:2px;}
    .tooltip-row strong{color:var(--text);}
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);text-align:center;padding:24px;}
    .empty-icon{font-size:40px;opacity:.4;}
    .empty-text{font-size:13px;line-height:1.6;}
    .legend{position:absolute;top:10px;left:10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}
    .legend-row{display:flex;align-items:center;gap:6px;margin-top:4px;}
    .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    #status-bar{padding:6px 16px;background:var(--surface2);border-top:1px solid var(--border);font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;min-height:26px;}
    #status-bar.ok{color:var(--accent);}
    #status-bar.err{color:var(--warn);}

    /* History tab */
    .history-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;}
    .history-card:hover{border-color:var(--accent2);}
    .history-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
    .history-seed{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--accent2);}
    .history-type{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1px 6px;}
    .history-meta{font-size:10px;color:var(--muted);margin-top:2px;}
    .history-delete{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 2px;width:auto;transition:color .2s;}
    .history-delete:hover{color:var(--warn);opacity:1;}

    /* Active path neon pulse link */
    .active-path-link {
      stroke: var(--accent2) !important;
      stroke-dasharray: 6, 6;
      animation: dash 1s linear infinite;
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -12;
      }
    }
    
    /* Spinner */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<header>
  <div class="header-title">GitHub <span>SNA</span></div>
  <div class="seed-badge" id="seedBadge">—</div>
  <div class="stats-row">
    <div class="stat"><strong id="statNodes">0</strong> users</div>
    <div class="stat"><strong id="statEdges">0</strong> edges</div>
    <div class="stat"><strong id="statComm">0</strong> communities</div>
  </div>
</header>

<div class="main">
  <div id="graph-wrap">
    <div id="loadingOverlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 17, 23, 0.85); z-index: 10; flex-direction: column; align-items: center; justify-content: center; gap: 16px;">
      <div style="width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <div id="loadingText" style="font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text); text-align: center; padding: 0 20px;">Analyzing network…</div>
    </div>
    <div class="empty" id="emptyState">
      <div class="empty-icon">⬡</div>
      <div class="empty-text">Run an analysis in the popup<br>to see your graph here</div>
    </div>
    <svg id="graph-svg"></svg>
    <div class="legend" id="legend" style="display:none">
      <div style="font-weight:700;margin-bottom:2px">Communities</div>
      <div id="legend-items"></div>
    </div>
    <div class="graph-controls">
      <button class="ctrl-btn" id="zoomIn" title="Zoom In">+</button>
      <button class="ctrl-btn" id="zoomOut" title="Zoom Out">−</button>
      <button class="ctrl-btn" id="resetZoom" title="Reset View">⌂</button>
    </div>
    <div id="tooltip">
      <div class="tooltip-name"></div>
    </div>
  </div>

  <aside>
    <div class="tabs">
      <button class="tab active" data-tab="influencers">Rank</button>
      <button class="tab" data-tab="paths">Paths</button>
      <button class="tab" data-tab="communities">Clusters</button>
      <button class="tab" data-tab="history">History</button>
    </div>
    <div style="padding: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;">
      <input type="text" id="searchNodes" placeholder="Search username…" autocomplete="off" spellcheck="false" style="width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 11px; padding: 7px 10px; outline: none; transition: border-color 0.2s;" />
    </div>

    <div class="tab-content active influencers">
      <!-- Populated by JS -->
    </div>

    <div class="tab-content paths">
      <div class="path-inputs">
        <input type="text" id="pathStart" placeholder="Source login" spellcheck="false">
        <input type="text" id="pathEnd" placeholder="Target login" spellcheck="false">
      </div>
      <button class="find-btn" id="findPathBtn">Find Path</button>
      <div id="path-result"></div>
    </div>

    <div class="tab-content communities">
      <!-- Populated by JS -->
    </div>

    <div class="tab-content history">
      <!-- Populated by JS -->
    </div>
    <div id="detailCard" style="display: none; border-top: 1px solid var(--border); padding: 12px; background: var(--surface2); flex-shrink: 0; flex-direction: column; gap: 8px;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <img id="detailAvatar" src="" style="width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface);" />
        <div style="min-width: 0; flex: 1;">
          <div id="detailLogin" style="font-weight: 700; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--accent2);">—</div>
          <div id="detailName" style="font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">—</div>
        </div>
        <button id="closeDetail" style="background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 6px;">×</button>
      </div>
      <div id="detailBio" style="font-size: 11px; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 16px;">Loading profile…</div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 10px; font-family: 'Space Mono', monospace;">
        <div style="background: var(--bg); border: 1px solid var(--border); padding: 4px 6px; border-radius: 4px;">
          <span style="color: var(--muted)">Repos:</span> <strong id="detailRepos">—</strong>
        </div>
        <div style="background: var(--bg); border: 1px solid var(--border); padding: 4px 6px; border-radius: 4px;">
          <span style="color: var(--muted)">Followers:</span> <strong id="detailFollowers">—</strong>
        </div>
      </div>
      <div style="display: flex; gap: 6px; margin-top: 4px;">
        <a id="detailGithubLink" href="#" target="_blank" style="flex: 1; text-align: center; background: var(--surface); border: 1px solid var(--border); color: var(--accent2); text-decoration: none; border-radius: 4px; font-size: 10px; font-weight: 700; padding: 6px 0; font-family: 'Space Mono', monospace; transition: background 0.2s;">PROFILE ↗</a>
        <button id="detailAnalyzeBtn" style="flex: 1; text-align: center; background: var(--accent); color: var(--bg); border: none; border-radius: 4px; font-size: 10px; font-weight: 700; padding: 6px 0; font-family: 'Space Mono', monospace; cursor: pointer; transition: opacity 0.2s;">ANALYZE ↻</button>
      </div>
    </div>
  </aside>
</div>

<div id="status-bar">Loading…</div>

<script type="module" src="panel.js"></script>
</body>
</html>
